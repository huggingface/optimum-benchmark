name: Build Images

on:
  workflow_dispatch:
  push:
    paths:
      - "docker/**"
      - ".github/workflows/build_images.yaml"
    branches:
      - build_images_*

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check_hf_cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ls /mnt/hf_cache
        run: ls /mnt/hf_cache

      - name: Build
        run: docker build
          --file docker/cuda.dockerfile
          --build-arg TORCH_CUDA=${{ matrix.image.torch_cuda }}
          --build-arg CUDA_VERSION=${{ matrix.image.cuda_version }}
          --build-arg TORCH_PRE_RELEASE=${{ matrix.image.torch_pre_release }}
          --tag cuda:${{ matrix.image.cuda_version }}
          .

      - name: Save
        run: |
          mkdir -p /mnt/hf_cache/optimum_benchmark
          apt update && apt install -y pigz
          docker save cuda:${{ matrix.image.cuda_version }} | pigz --fast > /mnt/hf_cache/optimum_benchmark/cuda-${{ matrix.image.cuda_version }}.tar.gz

      - name: Load
        run: |
          docker load < /mnt/hf_cache/optimum_benchmark/cuda-${{ matrix.image.cuda_version }}.tar.gz

      - name: Test
        run: |
          docker run --rm cuda:${{ matrix.image.cuda_version }} python -c "import torch; print(torch.__version__)"
